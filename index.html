<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>js-our-team</title>
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sono:wght,MONO@200..800,1&display=swap" rel="stylesheet" />
    <!-- css custom -->
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
</head>

<body>
    <div class="container">

        <div class="hero">
            <h2 class="hero-title">Meet our team</h2>
            <p class="hero-description">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Iusto accusamus minus
                temporibus perferendis aperiam quaerat.</p>
        </div>

        <div class="team-container">
            <!-- Cards inserite nel DOM lato js -->
        </div>

        <form id="form-aggiunta">
            <label for="inputName">Nome Cognome</label>
            <input type="text" id="inputName" placeholder="Nome e Cognome" required>
            <label for="inputRole">Ruolo</label>
            <input type="text" id="inputRole" placeholder="Ruolo" required>
            <label for="inputMail">Mail</label>
            <input type="mail" id="inputMail" placeholder="Mail" required>
            <label for="inputImg">IImmagine</label>
            <input type="text" id="inputImg" placeholder="Percorso immagine" required>
            <button type="submit" id="submitBtn">Aggiungi</button>
        </form>

    </div>
</body>

</html>
